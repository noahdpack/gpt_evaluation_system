id: "GEN-017"
name: "Vendor May Use Customer Data Broadly"
category: "Privacy & Security"
contract_type: "SaaS Agreement"
reviewer_perspective: "Customer-side"
primary_skill_tested: "Risk assessment / Issue spotting"
input_type: "Full clause"

input_text: |
  Vendor may use Customer Data to provide the Services, improve Vendor’s products, develop new features, train machine learning models, create analytics, and for any other business purpose.

expected:
  finding: >
    The vendor has broad rights to use customer data, including for product improvement,
    AI/model training, analytics, and any other business purpose.

  explanation: >
    Broad data-use rights may create privacy, confidentiality, competitive, regulatory,
    and business risks for the customer.

  severity: "High"

  recommendation: >
    Limit vendor’s use of customer data to providing the services, with any analytics
    or improvement use limited to aggregated/de-identified data and subject to
    confidentiality, privacy, and security restrictions. Prohibit AI training unless expressly approved.

assertions:
  required_phrases:
    - "train machine learning models"
    - "create analytics"
    - "any other business purpose"

  required_concepts:
    - "Broad customer data use rights"
    - "AI or machine learning training risk"
    - "Need to limit use to providing services or approved aggregated/de-identified uses"

  prohibited_phrases:
    - "acceptable because disclosed"
    - "data is anonymized"

  prohibited_concepts:
    - "Assuming customer data is anonymized"
    - "Ignoring AI/model training language"
    - "Treating disclosure of broad use as sufficient protection"

must_have_output_elements:
  - "Identifies the issue clearly"
  - "Quotes or cites the relevant contract language"
  - "Explains why the issue matters"
  - "Assigns an appropriate severity"
  - "Gives a practical recommendation"
  - "Reviews from the stated perspective"
  - "Does not invent facts outside the excerpt"

should_not_say_avoid:
  - "Do not say data use is acceptable because it is disclosed"
  - "Do not ignore AI training language"
  - "Do not assume data is anonymized"

fail_conditions:
  - "Misses broad data-use issue"
  - "Does not identify AI/model training"
  - "Gives generic privacy advice only"

scoring_rubric:
  "5": "Fully identifies issue, explains risk, gives practical recommendation, and follows reviewer perspective."
  "4": "Correct issue and recommendation, but explanation or severity is slightly weak."
  "3": "Spots the issue but misses nuance, severity, or party-specific impact."
  "2": "Vague or generic response; only partially relevant."
  "1": "Mostly incorrect but mentions something related."
  "0": "Misses the issue or gives harmful/invented guidance."

pass_threshold: 4

evaluator_notes: ""